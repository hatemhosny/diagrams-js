name: Sync Resources from Python Repo

run-name: Sync Resources

on:
  schedule:
    # Run daily at 2:00 AM UTC
    - cron: "0 2 * * *"
  workflow_dispatch:

concurrency:
  group: sync-resources
  cancel-in-progress: true

jobs:
  check-and-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout diagrams-js repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout diagrams-py repository
        uses: actions/checkout@v4
        with:
          repository: mingrammer/diagrams
          path: diagrams-py
          fetch-depth: 1

      - name: Compare resources
        id: compare
        run: |
          # Create a temporary script to compare resources
          cat > /tmp/compare_resources.py << 'PYTHON_SCRIPT'
          import os
          import json
          import sys
          from pathlib import Path

          def get_resource_files(resources_dir):
              """Get all resource files recursively with relative paths"""
              files = {}
              resources_path = Path(resources_dir)
              if resources_path.exists():
                  for file in resources_path.rglob('*'):
                      if file.is_file():
                          rel_path = file.relative_to(resources_path)
                          files[str(rel_path)] = file.stat().st_size
              return files

          def main():
              js_resources = Path('./resources')
              py_resources = Path('./diagrams-py/resources')

              if not py_resources.exists():
                  print("Python resources directory not found")
                  sys.exit(0)

              js_files = get_resource_files(js_resources)
              py_files = get_resource_files(py_resources)

              new_files = []
              updated_files = []

              for rel_path, size in py_files.items():
                  if rel_path not in js_files:
                      new_files.append(str(rel_path))
                  elif js_files[rel_path] != size:
                      updated_files.append(str(rel_path))

              result = {
                  'has_changes': len(new_files) > 0 or len(updated_files) > 0,
                  'new_files': new_files,
                  'updated_files': updated_files,
                  'new_count': len(new_files),
                  'updated_count': len(updated_files)
              }

              print(json.dumps(result, indent=2))

              # Save to file for later steps
              with open('/tmp/sync_result.json', 'w') as f:
                  json.dump(result, f, indent=2)

              return result['has_changes']

          if __name__ == '__main__':
              has_changes = main()
              sys.exit(0 if not has_changes else 1)
          PYTHON_SCRIPT

          python3 /tmp/compare_resources.py
          echo "HAS_CHANGES=$?" >> $GITHUB_ENV

          # Check if the Python script found changes
          if [ -f /tmp/sync_result.json ]; then
            HAS_CHANGES=$(python3 -c "import json; print(json.load(open('/tmp/sync_result.json'))['has_changes'])")
            echo "has_changes=$HAS_CHANGES" >> $GITHUB_OUTPUT

            # Store the counts and file lists
            NEW_COUNT=$(python3 -c "import json; print(json.load(open('/tmp/sync_result.json'))['new_count'])")
            UPDATED_COUNT=$(python3 -c "import json; print(json.load(open('/tmp/sync_result.json'))['updated_count'])")
            echo "new_count=$NEW_COUNT" >> $GITHUB_OUTPUT
            echo "updated_count=$UPDATED_COUNT" >> $GITHUB_OUTPUT

            # Store file lists as multiline strings
            NEW_FILES=$(python3 -c "import json; data=json.load(open('/tmp/sync_result.json')); print('\\n'.join(data['new_files']))")
            UPDATED_FILES=$(python3 -c "import json; data=json.load(open('/tmp/sync_result.json')); print('\\n'.join(data['updated_files']))")

            echo "new_files<<EOF" >> $GITHUB_OUTPUT
            echo "$NEW_FILES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT

            echo "updated_files<<EOF" >> $GITHUB_OUTPUT
            echo "$UPDATED_FILES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "new_count=0" >> $GITHUB_OUTPUT
            echo "updated_count=0" >> $GITHUB_OUTPUT
          fi

      - name: Install pnpm
        if: steps.compare.outputs.has_changes == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        if: steps.compare.outputs.has_changes == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "24.4.1"
          cache: "pnpm"
          cache-dependency-path: ./pnpm-lock.yaml

      - name: Install Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24.4.1"
          cache: true

      - name: Sync resources
        if: steps.compare.outputs.has_changes == 'true'
        run: |
          # Copy new/updated resources from Python repo
          cp -r ./diagrams-py/resources/* ./resources/ 2>/dev/null || true

          # Install dependencies for generation
          vp install

          # Run generate script to create TypeScript providers
          npx tsx scripts/generate.ts

          # Build providers
          vp run build:providers

      - name: Run tests
        if: steps.compare.outputs.has_changes == 'true'
        run: vp run test

      - name: Run checks
        if: steps.compare.outputs.has_changes == 'true'
        run: vp run check

      - name: Create Pull Request
        if: steps.compare.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: sync resources from Python diagrams repo"
          title: "chore: sync resources from Python diagrams repo"
          body: |
            ## Resource Sync from Python Diagrams Repository

            This PR synchronizes resources from the [mingrammer/diagrams](https://github.com/mingrammer/diagrams) Python repository.

            ### Summary
            - **New resources**: ${{ steps.compare.outputs.new_count }}
            - **Updated resources**: ${{ steps.compare.outputs.updated_count }}

            ### New Files
            ```
            ${{ steps.compare.outputs.new_files }}
            ```

            ### Updated Files
            ```
            ${{ steps.compare.outputs.updated_files }}
            ```

            ### Changes Made
            1. Copied new/updated icon resources from Python repo
            2. Regenerated TypeScript provider classes
            3. Rebuilt provider bundles

            ### Checklist
            - [ ] Resources synced from Python repo
            - [ ] Provider classes regenerated
            - [ ] Tests pass
            - [ ] Build succeeds
            - [ ] No breaking changes introduced

            ---
            **Note**: This PR was automatically generated by the resource sync workflow.
          branch: sync/resources-from-python
          delete-branch: true
          labels: |
            automated
            dependencies
            resources
