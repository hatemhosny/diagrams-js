name: LiveCodes Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "diagrams-js/**"
      - "!diagrams-js/**/*.md"
      - "!diagrams-js/docs/**"

jobs:
  preview:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: ./diagrams-js/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ./diagrams-js
        run: pnpm install --frozen-lockfile

      - name: Build library
        working-directory: ./diagrams-js
        run: pnpm run build

      - name: Generate example diagrams
        working-directory: ./diagrams-js
        run: |
          # Create a demo script that generates example diagrams
          cat > /tmp/generate-examples.mjs << 'EOF'
          import { Diagram } from './dist/index.js';
          import { AWS, Azure, GCP, Kubernetes } from './dist/index.js';
          import * as fs from 'fs';
          import * as path from 'path';

          async function generateExamples() {
            // Example 1: Simple AWS Diagram
            const diagram1 = new Diagram('AWS Simple Architecture', { direction: 'TB' });
            const ec2 = AWS.Compute.EC2('Web Server');
            const s3 = AWS.Storage.S3('Storage');
            const rds = AWS.Database.RDS('Database');
            
            diagram1.connect(ec2, rds);
            diagram1.connect(ec2, s3);
            
            const svg1 = await diagram1.render();
            fs.mkdirSync('./examples', { recursive: true });
            fs.writeFileSync('./examples/aws-simple.svg', svg1);
            diagram1.destroy();

            // Example 2: Multi-cloud diagram
            const diagram2 = new Diagram('Multi-Cloud Setup');
            const awsLambda = AWS.Compute.Lambda('Lambda Function');
            const azureFunction = Azure.Compute.FunctionApp('Azure Function');
            const gcpFunction = GCP.Compute.Run('Cloud Run');
            
            diagram2.connect(awsLambda, azureFunction, { label: 'sync' });
            diagram2.connect(azureFunction, gcpFunction, { label: 'backup' });
            
            const svg2 = await diagram2.render();
            fs.writeFileSync('./examples/multicloud.svg', svg2);
            diagram2.destroy();

            // Example 3: Kubernetes cluster
            const diagram3 = new Diagram('K8s Cluster');
            const ingress = K8s.Network.Ingress('Ingress');
            const service = K8s.Network.Service('Service');
            const pod = K8s.Compute.Pod('Pod');
            
            diagram3.connect(ingress, service);
            diagram3.connect(service, pod);
            
            const svg3 = await diagram3.render();
            fs.writeFileSync('./examples/kubernetes.svg', svg3);
            diagram3.destroy();

            console.log('Examples generated successfully!');
          }

          generateExamples().catch(console.error);
          EOF

          node /tmp/generate-examples.mjs

      - name: Create LiveCodes preview
        uses: live-codes/preview-in-livecodes@v1
        with:
          # Create a preview of the diagrams-js library
          code: |
            import { Diagram, AWS, Azure, GCP, Kubernetes } from 'https://cdn.jsdelivr.net/npm/diagrams-js@latest/dist/index.js';

            // Create a simple example
            async function createDiagram() {
              const diagram = new Diagram('Live Preview', { direction: 'TB' });
              const ec2 = AWS.Compute.EC2('Server');
              const rds = AWS.Database.RDS('Database');
              diagram.connect(ec2, rds);
              
              const container = document.getElementById('diagram-container');
              const svg = await diagram.render();
              container.innerHTML = svg;
              
              diagram.destroy();
            }

            createDiagram();
          markup: |
            <div id="diagram-container" style="padding: 20px; text-align: center;">
              <p>Loading diagram...</p>
            </div>
            <div style="margin-top: 20px; padding: 15px; background: #f5f5f5; border-radius: 8px;">
              <h3>About diagrams-js</h3>
              <p>A TypeScript port of the diagrams Python library for drawing cloud system architecture diagrams as code.</p>
              <p><strong>Features:</strong></p>
              <ul style="text-align: left; display: inline-block;">
                <li>17+ cloud providers (AWS, Azure, GCP, Kubernetes, etc.)</li>
                <li>1000+ node classes</li>
                <li>Works in Node.js, browsers, Deno, Bun</li>
                <li>Full TypeScript support</li>
                <li>WebAssembly-powered rendering</li>
              </ul>
            </div>
          config: |
            {
              "title": "diagrams-js Preview",
              "description": "Interactive preview of diagrams-js library"
            }
          comment-template: |
            ## LiveCodes Preview

            🎨 **Try the library interactively!**

            [Open in LiveCodes]({{livecodesUrl}})

            This preview demonstrates the diagrams-js library with live examples. You can:
            - View generated diagrams
            - Modify the code to create your own diagrams
            - Export diagrams as SVG or PNG

            ### Available Providers in This Preview
            - AWS (EC2, S3, RDS, Lambda, and more)
            - Azure (VMs, Functions, Storage, etc.)
            - GCP (Compute Engine, Cloud Run, BigQuery, etc.)
            - Kubernetes (Pods, Services, Ingress, etc.)

            ### Quick Example
            ```typescript
            import { Diagram, AWS } from 'diagrams-js';

            const diagram = new Diagram('My Architecture');
            const ec2 = AWS.Compute.EC2('Server');
            const rds = AWS.Database.RDS('Database');
            diagram.connect(ec2, rds);

            const svg = await diagram.render();
            ```
          comment-on-pr: true
