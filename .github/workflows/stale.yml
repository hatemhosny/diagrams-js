name: Close stale issues and PRs

on:
  schedule:
    # Run every day at 1:30 AM UTC
    - cron: "30 1 * * *"
  workflow_dispatch:

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          # Issue settings
          stale-issue-message: |
            This issue has been automatically marked as stale because it has not had
            recent activity. It will be closed in 7 days if no further activity occurs.

            If this issue is still relevant, please comment to keep it open.
            Thank you for your contributions!
          close-issue-message: |
            This issue has been automatically closed due to inactivity.
            If you believe this is still an issue, please reopen it or create a new one.
          stale-issue-label: "stale"
          exempt-issue-labels: "pinned,security,bug,help wanted"
          days-before-issue-stale: 60
          days-before-issue-close: 7

          # PR settings
          stale-pr-message: |
            This pull request has been automatically marked as stale because it has not had
            recent activity. It will be closed in 7 days if no further activity occurs.

            If you're still working on this, please comment to keep it open.
            Thank you for your contributions!
          close-pr-message: |
            This pull request has been automatically closed due to inactivity.
            If you're still working on this, please reopen it or create a new one.
          stale-pr-label: "stale"
          exempt-pr-labels: "pinned,work in progress"
          days-before-pr-stale: 30
          days-before-pr-close: 7

          # General settings
          operations-per-run: 100
          remove-stale-when-updated: true
          delete-branch: false
