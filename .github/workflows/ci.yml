name: CI

on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.4.1"
          cache: "pnpm"
          cache-dependency-path: ./pnpm-lock.yaml

      - name: Install Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24.4.1"
          cache: true

      - name: Install dependencies
        run: vp install

      - name: Run tests
        run: vp run test

      - name: Run checks (lint, format, types)
        run: vp run check

      - name: Build package
        run: vp run build

  build-docs:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./docs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.4.1"
          cache: "pnpm"
          cache-dependency-path: ./docs/pnpm-lock.yaml

      - name: Install Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24.4.1"
          cache: true

      - name: Install dependencies
        run: vp install

      - name: Build documentation
        run: vp run build
