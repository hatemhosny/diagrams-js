  - name: "SVG Serialization"
    slug: "svg-serialization"
    domain: "diagram-creation"
    description: "SVG export and import with embedded metadata for round-trip serialization"
    type: "core"
    covers:
      - "SVG output with embedded metadata"
      - "Diagram.fromSVG()"
      - "diagram.import(svgString, 'svg')"
