      - "Query SVG elements via data attributes"
    failure_modes:
      - mistake: "Trying to import plain SVG without embedded data"
        mechanism: "Only SVGs rendered by diagrams-js contain embedded metadata"
        wrong_pattern: |
          const plainSvg = `<svg><text>Hello</text></svg>`;
          const diagram = await Diagram.fromSVG(plainSvg); // Throws
        correct_pattern: |
          const svg = await diagram.render();
          const restored = await Diagram.fromSVG(svg);
        source: "source code - svg.ts extractDiagramData validation"
        priority: "CRITICAL"
        status: "active"
        skills: ["svg-serialization"]
      - mistake: "Assuming embedData defaults to false"
        mechanism: "embedData defaults to true; SVG always contains metadata unless opted out"
        wrong_pattern: |
          const svg = await diagram.render();
          // Surprised that SVG contains data attributes?
        correct_pattern: |
          const svg = await diagram.render(); // Contains data-diagram-json
          const clean = await diagram.render({ embedData: false });
        source: "source code - Diagram.ts render() embedData check"
        priority: "HIGH"
        status: "active"
        skills: ["svg-serialization"]
      - mistake: "Using diagram.export('svg') expecting different output from render()"
        mechanism: "export('svg') is identical to render({ format: 'svg' })"
        wrong_pattern: |
          const rendered = await diagram.render();
          const exported = await diagram.export("svg"); // Same output
        correct_pattern: |
          const svg = await diagram.render(); // Use directly
        source: "source code - svg.ts exporter implementation"
        priority: "MEDIUM"
