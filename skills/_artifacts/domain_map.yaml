skills:
  - name: "Getting Started"
    slug: "getting-started"
    domain: "diagram-creation"
    description: "Installation, first diagram creation, and basic concepts"
    type: "lifecycle"
    covers:
      - "Diagram constructor"
      - "diagram.add()"
      - "diagram.render()"
      - "Installation (npm/yarn/pnpm/bun)"
      - "CDN usage with import maps"
      - "ESM-only requirements"
    tasks:
      - "Install diagrams-js in a project"
      - "Create first diagram"
      - "Render diagram to SVG"
      - "Use in browser without build steps"
    failure_modes:
      - mistake: "Not awaiting diagram.render()"
        mechanism: "Returns Promise - must be awaited or use .then()"
        wrong_pattern: |
          const svg = diagram.render();
          console.log(svg); // Promise, not string
        correct_pattern: |
          const svg = await diagram.render();
          console.log(svg); // SVG string
        source: "source code - Diagram.ts render() returns Promise"
        priority: "HIGH"
        status: "active"
        skills: ["getting-started", "rendering-export"]
      - mistake: "Using wrong import path for providers"
        mechanism: "Provider imports use subpath imports like diagrams-js/aws/compute"
        wrong_pattern: |
          import { EC2 } from "diagrams-js/providers/aws/compute";
        correct_pattern: |
          import { EC2 } from "diagrams-js/aws/compute";
        source: "migration guide and package.json exports"
        priority: "HIGH"
        status: "active"
        skills: ["getting-started", "provider-nodes"]
      - mistake: "Assuming nodes auto-register with diagram"
        mechanism: "Must explicitly call diagram.add() for each node before connecting"
        wrong_pattern: |
          const web = EC2("Web Server"); // Not added to diagram!
          const db = diagram.add(RDS("Database"));
          web.to(db); // Error: Node is not registered
        correct_pattern: |
          const web = diagram.add(EC2("Web Server"));
          const db = diagram.add(RDS("Database"));
          web.to(db); // Works
        source: "migration guide from Python"
        priority: "CRITICAL"
        status: "active"
        skills: ["getting-started", "provider-nodes", "node-connections"]

