  - name: "Node Connections"
    slug: "node-connections"
    domain: "connections-flow"
    description: "Connecting nodes with .to(), .from(), .with() methods and Edge styling"
    type: "core"
    covers:
      - "node.to(target) - forward connection"
      - "node.from(source) - reverse connection"
      - "node.with(target) - undirected connection"
      - "Edge() for styling (color, style, label, forward, reverse)"
      - "Edge chaining"
      - "Multiple targets with arrays"
      - "Connection direction control"
      - "Edge CSS classes and data attributes"
    tasks:
      - "Create forward data flow"
      - "Create reverse connections"
      - "Add bidirectional connections"
      - "Style edges with colors and labels"
      - "Connect to multiple targets"
    failure_modes:
      - mistake: "Confusing .to() and .from() direction"
        mechanism: ".to() creates arrow from source to target, .from() creates arrow pointing back"
        wrong_pattern: |
          // Want: db << api (arrow from api to db)
          db.to(api); // Wrong! Creates db -> api
        correct_pattern: |
          // Want: db << api (arrow from api to db)
          db.from(api); // Correct! Creates api -> db with dir=back
        source: "migration guide and docs/guides/node.mdx"
        priority: "HIGH"
        status: "active"
        skills: ["node-connections"]
      - mistake: "Using Python >> operator syntax"
        mechanism: "TypeScript uses .to() method, not >> operator"
        wrong_pattern: |
          web >> api >> database; // Python syntax
        correct_pattern: |
          web.to(api).to(database); // TypeScript syntax
        source: "migration guide"
        priority: "CRITICAL"
        status: "active"
        skills: ["node-connections", "python-migration"]
      - mistake: "Trying to connect nodes not added to diagram"
        mechanism: "Nodes must be registered with diagram before connecting"
        wrong_pattern: |
          const web = EC2("Web"); // Not added!
          const db = diagram.add(RDS("DB"));
          web.to(db); // Error: Node is not registered with a diagram
        correct_pattern: |
          const web = diagram.add(EC2("Web"));
          const db = diagram.add(RDS("DB"));
          web.to(db); // Works!
        source: "source code - Node.ts connect() method throws error"
        priority: "CRITICAL"
        status: "active"
        skills: ["node-connections", "provider-nodes"]
      - mistake: "Passing wrong argument order with Edge"
        mechanism: "Edge goes first when styling: node.to(Edge({...}), target)"
        wrong_pattern: |
          web.to(db, Edge({ color: "red" })); // Wrong order
        correct_pattern: |
          web.to(Edge({ color: "red" }), db); // Correct order
        source: "docs/guides/edge.mdx"
        priority: "HIGH"
        status: "active"
        skills: ["node-connections"]

