tensions:
  - name: "Implicit vs explicit node registration"
    skills: ["provider-nodes", "node-connections"]
    description: "Python auto-registers nodes, TypeScript requires explicit diagram.add()"
    implication: "Agents assume Python-like behavior and forget to call diagram.add(), causing silent failures when connecting nodes"

  - name: "Sync vs async rendering"
    skills: ["getting-started", "rendering-export"]
    description: "Python renders synchronously, TypeScript uses async/await"
    implication: "Agents may forget await, causing code to work with Promise objects instead of actual output"

  - name: "Browser vs Node.js capabilities"
    skills: ["browser-integration", "nodejs-integration"]
    description: "Some features work only in specific environments (sharp for PNG in Node.js, file download in browser)"
    implication: "Agents may generate code that uses Node.js APIs in browser context or vice versa"

