        mechanism: "renderDiff is async because it renders both diagrams to SVG"
        wrong_pattern: |
          const html = renderDiff(diff, before, after); // Missing await
        correct_pattern: |
          const html = await renderDiff(diff, before, after);
        source: "source code - diff.ts renderDiff signature"
