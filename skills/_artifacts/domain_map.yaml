  - name: "Environment Integration"
    slug: "environment-integration"
    description: "Using diagrams-js in different environments (browser, Node.js, CI/CD)"

  - name: "Migration & Interoperability"
    slug: "migration-interop"
    description: "Migrating from Python diagrams and integrating with other tools"

  - name: "Extensibility"
    slug: "extensibility"
    description: "Plugin system for extending diagrams-js with custom import/export formats, metadata providers, and concrete plugins"

  - name: "CLI & Tooling"
    slug: "tooling"
