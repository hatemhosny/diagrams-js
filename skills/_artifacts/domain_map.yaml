library:
  name: "diagrams-js"
  version: "0.7.1"
  repository: "https://github.com/diagrams-js/diagrams-js"
  description: "A TypeScript port of the Python diagrams library for drawing cloud system architecture diagrams as code"
  primary_framework: "framework-agnostic"

domains:
  - name: "Diagram Creation"
    slug: "diagram-creation"
    description: "Creating, configuring, rendering, and serializing diagrams with various output formats"

  - name: "Node Management"
    slug: "node-management"
    description: "Adding and configuring nodes from providers or custom sources"

  - name: "Connections & Flow"
    slug: "connections-flow"
    description: "Connecting nodes with edges and controlling data flow direction"

  - name: "Organization & Layout"
    slug: "organization-layout"
