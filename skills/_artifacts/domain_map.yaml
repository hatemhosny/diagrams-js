  - name: "Rendering & Export"
    slug: "rendering-export"
    domain: "diagram-creation"
    description: "Rendering diagrams to SVG, PNG, JPG, DOT formats and saving files"
    type: "core"
    covers:
      - "diagram.render() options"
      - "SVG output (string)"
      - "PNG/JPG output (Uint8Array)"
      - "DOT output (Graphviz source)"
      - "Data URL output"
      - "diagram.save()"
      - "PNG/JPG scale, width, height options"
      - "SVG DOM manipulation with className and dataAttrs"
      - "after:layout hook for SVG post-processing"
    tasks:
      - "Render to SVG string"
      - "Render to PNG binary"
      - "Get data URL for embedding"
      - "Save to file"
      - "Export to DOT format"
      - "Post-process SVG before rasterization"
    failure_modes:
      - mistake: "Trying to render PNG without sharp installed"
        mechanism: "PNG/JPG rendering requires sharp package in Node.js"
        wrong_pattern: |
          // sharp not installed
          const png = await diagram.render({ format: "png" });
        correct_pattern: |
          // npm install sharp
          const png = await diagram.render({ format: "png" });
        source: "source code - Diagram.ts _svgToPngNode() error message"
        priority: "CRITICAL"
        status: "active"
        skills: ["rendering-export", "nodejs-integration"]
      - mistake: "Assuming render() always returns string"
        mechanism: "Returns Uint8Array for PNG/JPG, string for SVG/DOT"
        wrong_pattern: |
          const data = await diagram.render({ format: "png" });
          fs.writeFileSync("out.png", data); // Error: data is Uint8Array
        correct_pattern: |
          const data = await diagram.render({ format: "png" });
          fs.writeFileSync("out.png", Buffer.from(data));
        source: "source code - Diagram.ts render() overload types"
        priority: "HIGH"
        status: "active"
        skills: ["rendering-export"]
      - mistake: "Calling save() without filepath in browser"
        mechanism: "Browser triggers download with filename parameter"
        wrong_pattern: |
          await diagram.save(); // Uses default filename
        correct_pattern: |
          await diagram.save("my-diagram.svg");
        source: "source code - Diagram.ts save() method"
        priority: "MEDIUM"
        status: "active"
        skills: ["rendering-export", "browser-integration"]
      - mistake: "Forgetting to await Diagram.fromJSON()"
        mechanism: "Diagram.fromJSON() is async because it dynamically loads provider modules"
        wrong_pattern: |
          const diagram = Diagram.fromJSON(json); // Missing await
          const svg = await diagram.render(); // Error: diagram is Promise
        correct_pattern: |
          const diagram = await Diagram.fromJSON(json);
          const svg = await diagram.render();
        source: "source code - Diagram.ts fromJSON is async"
        priority: "HIGH"
        status: "active"
        skills: ["rendering-export", "json-serialization"]

